name: Android Risk Agents Pipeline (Agentic)

on:
  workflow_dispatch:

concurrency:
  group: android-risk-agents-pipeline
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache HuggingFace models (speedup)
      - name: Cache HF models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Seed sources (idempotent)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          USER_AGENT: "android-risk-agents-bot/0.1 (github-actions)"
        run: python -m src.seed_sources

      - name: Discover latest bulletins
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          USER_AGENT: "android-risk-agents-bot/0.1 (github-actions)"
        run: python -m src.discover_bulletins

      - name: Scrape sources (snapshots + baseline embeddings)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          USER_AGENT: "android-risk-agents-bot/0.1 (github-actions)"

          VECTOR_DIM: "384"
          EMBED_BASELINE_ON_FIRST_SNAPSHOT: "true"
        run: python -m src.scrape_sources

      - name: Detect changes (changes + delta embeddings + baseline-init changes)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          EMBED_DELTAS_ON_CHANGE: "true"

          # NEW: for first run demo - treat first snapshot as a change
          INIT_BASELINE_AS_CHANGE: "true"
          BASELINE_MAX_SOURCES: "10"
        run: python -m src.detect_changes

      - name: Sentinel triage agent (agent_events + change fields)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Groq now (OpenAI-compatible), GCP vLLM later
          LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_BASE_URL: "https://api.groq.com/openai/v1"
          MODEL_TRIAGE: "llama-3.1-8b-instant"

          AGENT_NAME: "sentinel-triage"
          RELEVANCE_THRESHOLD: "70"
        run: python -m src.agent_sentinel_triage

      - name: Coordinator agent (recommendations + insights)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_BASE_URL: "https://api.groq.com/openai/v1"
          MODEL_ANALYZE: "llama-3.3-70b-versatile"

          AGENT_NAME: "coordinator"
          RAG_TOP_K: "6"
          MAX_RECOMMENDATIONS: "8"
        run: python -m src.agent_coordinator