name: Android Risk Agents (Agents Only)

on:
  workflow_dispatch:

concurrency:
  group: android-risk-agents-agents-only
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DEBUG_LLM: "true"           # remove after it works
      TRIAGE_THRESHOLD: "0.70"
      RAG_TOP_K: "6"
      MAX_RECOMMENDATIONS: "8"

      MODEL_TRIAGE: "gemma-2-9b-it"
      MODEL_ANALYZE: "gemma-2-9b-it"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sentinel triage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          LLM_BASE_URL: ${{ secrets.NVIDIA_LLM_URL }}
        run: python -m src.agent_sentinel_triage

      - name: Coordinator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          LLM_BASE_URL: ${{ secrets.NVIDIA_LLM_URL }}
        run: python -m src.agent_coordinator