name: Android Risk Agents Pipeline (Agentic)

on:
  workflow_dispatch:

concurrency:
  group: android-risk-agents-pipeline
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      EMBEDDING_MODEL: "nomic"
      VECTOR_DIM: "768"
      VECTOR_TABLE: "vector_chunks"
      VECTOR_RPC_MATCH: "match_vector_chunks"

      USER_AGENT: "android-risk-agents-bot/0.1 (github-actions)"

      EMBED_BASELINE_ON_FIRST_SNAPSHOT: "true"
      EMBED_DELTAS_ON_CHANGE: "true"

      INIT_BASELINE_AS_CHANGE: "true"
      BASELINE_MAX_SOURCES: "25"

      AGENT_NAME_TRIAGE: "sentinel-triage"
      AGENT_NAME_COORD: "coordinator"

      RAG_TOP_K: "6"
      MAX_RECOMMENDATIONS: "20"

      TRIAGE_THRESHOLD: "0.35"
      MIN_SIMILARITY_THRESHOLD: "0.30"

      MODEL_TRIAGE: "google/gemma-2-9b-it"
      MODEL_ANALYZE: "google/gemma-2-9b-it"

      LLM_SUPPORTS_SYSTEM_ROLE: "false"
      SENTINEL_MAX_TOKENS: "240"
      COORDINATOR_MAX_TOKENS: "320"
      LLM_TIMEOUT_S: "30"
      LLM_MAX_RETRIES: "2"
      DEBUG_LLM: "true"

      SENTINEL_CONTENT_MAX_CHARS: "2400"
      COORD_EVENT_SUMMARY_MAX_CHARS: "700"
      COORD_RAG_QUERY_MAX_CHARS: "700"
      COORD_RAG_CHUNK_MAX_CHARS: "500"
      COORD_GENERAL_CONTEXT_MAX_CHARS: "2500"
      COORD_FP_CONTEXT_MAX_CHARS: "1800"
      COORD_FP_SUMMARY_MAX_CHARS: "180"
      COORD_FP_CHUNK_MAX_CHARS: "350"

      FINGERPRINT_ENABLED: "true"
      FINGERPRINT_MIN_LOCAL_RISK: "50"
      FINGERPRINT_MIN_RELEVANCE: "50"
      FINGERPRINT_TOP_K: "4"
      FINGERPRINT_VECTOR_RPC: "match_fingerprint_library_chunks"
      FINGERPRINT_TAG_MATCHES: "identifier,device,signal,signals,integrity,permission,permissions,sdk,api,root,emulator,attestation,privacy,telemetry,network,auth"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache HF models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Seed sources (idempotent)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.seed_sources

      - name: Discover latest bulletins
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.discover_bulletins

      - name: Scrape sources (snapshots + baseline embeddings)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.scrape_sources

      - name: Detect changes (changes + delta embeddings + baseline-init changes)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.detect_changes

      - name: Sentinel triage agent (agent_events + change fields)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          NVIDIA_API_KEY: ${{ secrets.GCP_LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.GCP_LLM_BASE_URL }}

          AGENT_NAME: ${{ env.AGENT_NAME_TRIAGE }}
          TRIAGE_THRESHOLD: ${{ env.TRIAGE_THRESHOLD }}
          MIN_SIMILARITY_THRESHOLD: ${{ env.MIN_SIMILARITY_THRESHOLD }}
          MODEL_TRIAGE: ${{ env.MODEL_TRIAGE }}

          LLM_SUPPORTS_SYSTEM_ROLE: ${{ env.LLM_SUPPORTS_SYSTEM_ROLE }}
          SENTINEL_MAX_TOKENS: ${{ env.SENTINEL_MAX_TOKENS }}
          LLM_TIMEOUT_S: ${{ env.LLM_TIMEOUT_S }}
          LLM_MAX_RETRIES: ${{ env.LLM_MAX_RETRIES }}
          DEBUG_LLM: ${{ env.DEBUG_LLM }}
          SENTINEL_CONTENT_MAX_CHARS: ${{ env.SENTINEL_CONTENT_MAX_CHARS }}
        run: python -m src.agent_sentinel_triage

      - name: Coordinator agent (recommendations + insights)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          NVIDIA_API_KEY: ${{ secrets.GCP_LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.GCP_LLM_BASE_URL }}

          AGENT_NAME: ${{ env.AGENT_NAME_COORD }}
          MODEL_ANALYZE: ${{ env.MODEL_ANALYZE }}
          RAG_TOP_K: ${{ env.RAG_TOP_K }}
          MAX_RECOMMENDATIONS: ${{ env.MAX_RECOMMENDATIONS }}

          LLM_SUPPORTS_SYSTEM_ROLE: ${{ env.LLM_SUPPORTS_SYSTEM_ROLE }}
          COORDINATOR_MAX_TOKENS: ${{ env.COORDINATOR_MAX_TOKENS }}
          LLM_TIMEOUT_S: ${{ env.LLM_TIMEOUT_S }}
          LLM_MAX_RETRIES: ${{ env.LLM_MAX_RETRIES }}
          DEBUG_LLM: ${{ env.DEBUG_LLM }}

          COORD_EVENT_SUMMARY_MAX_CHARS: ${{ env.COORD_EVENT_SUMMARY_MAX_CHARS }}
          COORD_RAG_QUERY_MAX_CHARS: ${{ env.COORD_RAG_QUERY_MAX_CHARS }}
          COORD_RAG_CHUNK_MAX_CHARS: ${{ env.COORD_RAG_CHUNK_MAX_CHARS }}
          COORD_GENERAL_CONTEXT_MAX_CHARS: ${{ env.COORD_GENERAL_CONTEXT_MAX_CHARS }}
          COORD_FP_CONTEXT_MAX_CHARS: ${{ env.COORD_FP_CONTEXT_MAX_CHARS }}
          COORD_FP_SUMMARY_MAX_CHARS: ${{ env.COORD_FP_SUMMARY_MAX_CHARS }}
          COORD_FP_CHUNK_MAX_CHARS: ${{ env.COORD_FP_CHUNK_MAX_CHARS }}

          FINGERPRINT_ENABLED: ${{ env.FINGERPRINT_ENABLED }}
          FINGERPRINT_MIN_LOCAL_RISK: ${{ env.FINGERPRINT_MIN_LOCAL_RISK }}
          FINGERPRINT_MIN_RELEVANCE: ${{ env.FINGERPRINT_MIN_RELEVANCE }}
          FINGERPRINT_TOP_K: ${{ env.FINGERPRINT_TOP_K }}
          FINGERPRINT_VECTOR_RPC: ${{ env.FINGERPRINT_VECTOR_RPC }}
          FINGERPRINT_TAG_MATCHES: ${{ env.FINGERPRINT_TAG_MATCHES }}
        run: python -m src.agent_coordinator